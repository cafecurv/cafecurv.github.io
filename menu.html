<style>
  :root {
    --bg:        #F7F5F0;
    --bg2:       #EEECEA;
    --bg3:       #E5E2DC;
    --navy:      #212842;
    --gray-dark: #3E3E3E;
    --gray-mid:  #6B6760;
    --gray-light:#8A8680;
    --accent:    #C8B89A;
    --price:     #212842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--gray-dark);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    padding: 2.8rem 1.5rem 1.4rem;
    text-align: center;
    border-bottom: 0.5px solid var(--bg3);
  }

  .logo {
    font-family: 'Cinzel', serif;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--navy);
    line-height: 1;
  }

  .logo-line {
    width: 60px;
    height: 1px;
    background: var(--accent);
    margin: 10px auto 10px;
  }

  .header-tagline {
    font-family: 'Raleway', sans-serif;
    font-style: italic;
    font-weight: 600;
    font-size: 0.75rem;
    color: var(--gray-mid);
    letter-spacing: 0.5px;
  }

  /* ── SUBHEADER ── */
  .subheader {
    text-align: center;
    padding: 1rem 1.5rem 0.8rem;
    background: var(--bg);
  }

  .subheader-label {
    font-family: 'Cinzel', serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 8px;
    color: var(--navy);
  }

  .subheader-line {
    width: 100%;
    max-width: 680px;
    height: 0.5px;
    background: var(--bg3);
    margin: 0.8rem auto 0;
  }
