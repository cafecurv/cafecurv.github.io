<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curv — Where Uncertainty Meets Possibility</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Jost:wght@200;300;400;500;600&family=Raleway:ital,wght@1,600&display=swap" rel="stylesheet">
<style>

  /* ── TOKENS ── */
  :root {
    /* Morning */
    --bg:         #F7F5F0;
    --bg2:        #EEECEA;
    --bg3:        #E5E2DC;
    --text:       #212842;
    --text2:      #3E3E3E;
    --text3:      #6B6760;
    --accent:     #C8B89A;
    --accent2:    #A89880;
    --hero-grad:  linear-gradient(160deg, #F7F5F0 0%, #EDE9E1 100%);
    --card-bg:    #EEECEA;
    --card-bdr:   #E5E2DC;
    --nav-bg:     rgba(247,245,240,0.92);
    --pill-bg:    #212842;
    --pill-color: #F7F5F0;
  }

  [data-mode="night"] {
    --bg:         #141824;
    --bg2:        #1C2235;
    --bg3:        #242C42;
    --text:       #F0EDE6;
    --text2:      #C8C0B4;
    --text3:      #8A8680;
    --accent:     #C8B89A;
    --accent2:    #A89880;
    --hero-grad:  linear-gradient(160deg, #141824 0%, #1A2138 100%);
    --card-bg:    #1C2235;
    --card-bdr:   #2A3350;
    --nav-bg:     rgba(20,24,36,0.92);
    --pill-bg:    #F0EDE6;
    --pill-color: #141824;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text2);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.6s ease, color 0.6s ease;
  }

  /* ── NAV ── */
  .nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--nav-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--bg3);
    transition: background 0.6s ease, border-color 0.6s ease;
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 5px;
    color: var(--text);
    text-decoration: none;
    transition: color 0.6s;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .nav-link {
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--text); }

  .nav-order-btn {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 20px;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.6s, color 0.6s;
  }


  /* ── LOGO ── */
  .curv-logo-img {
    width: 60px;
    height: 60px;
    object-fit: contain;
    /* Morning: navy */
    filter: brightness(0) saturate(100%) invert(14%) sepia(40%) saturate(900%) hue-rotate(196deg) brightness(90%) contrast(105%);
    transition: filter 0.6s ease;
  }

  [data-mode="night"] .curv-logo-img {
    /* Night: warm cream */
    filter: brightness(0) invert(1) sepia(8%) saturate(200%) hue-rotate(15deg) brightness(97%);
  }

  /* Hero logo */
  .hero-logo-img {
    width: 180px;
    height: 180px;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(14%) sepia(40%) saturate(900%) hue-rotate(196deg) brightness(90%) contrast(105%);
    opacity: 0.12;
    transition: filter 0.6s ease, opacity 0.6s ease;
    margin-bottom: 1rem;
  }

  [data-mode="night"] .hero-logo-img {
    filter: brightness(0) invert(1) sepia(8%) saturate(200%) hue-rotate(15deg) brightness(97%);
    opacity: 0.1;
  }

  /* Story section logo */
  .story-logo-img {
    width: 260px;
    height: 260px;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(14%) sepia(40%) saturate(900%) hue-rotate(196deg) brightness(90%) contrast(105%);
    opacity: 0.15;
    transition: filter 0.6s ease;
  }

  [data-mode="night"] .story-logo-img {
    filter: brightness(0) invert(1) sepia(8%) saturate(200%) hue-rotate(15deg) brightness(97%);
    opacity: 0.12;
  }

  .mode-toggle {

    height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--bg3);
